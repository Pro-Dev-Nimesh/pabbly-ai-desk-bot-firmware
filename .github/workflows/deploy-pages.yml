name: Deploy web flasher (GitHub Pages)

# Builds the firmware, drops the .bin files next to the flasher page, and
# publishes web-flasher/ to GitHub Pages so anyone can flash a board from
# their browser. Enable Pages once: Settings > Pages > Source = GitHub Actions.

on:
  push:
    branches: [main]
    paths: ['firmware/**', 'web-flasher/**', '.github/workflows/deploy-pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FQBN: esp32:esp32:XIAO_ESP32S3:PSRAM=opi

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh -s
          echo "$PWD/bin" >> "$GITHUB_PATH"

      - name: Install ESP32 core + libraries
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          arduino-cli lib install "U8g2"
          arduino-cli lib install "WiFiManager"

      - name: Compile firmware
        run: arduino-cli compile --fqbn "$FQBN" --export-binaries firmware/voicebot

      - name: Stage flasher + binaries
        run: |
          BUILD=$(find firmware/voicebot/build -type d -name "esp32.esp32.*" | head -1)
          mkdir -p web-flasher/firmware
          cp "$BUILD"/voicebot.ino.bin            web-flasher/firmware/app.bin
          cp "$BUILD"/voicebot.ino.bootloader.bin web-flasher/firmware/bootloader.bin
          cp "$BUILD"/voicebot.ino.partitions.bin web-flasher/firmware/partitions.bin
          find ~/.arduino15 -name boot_app0.bin -exec cp {} web-flasher/firmware/boot_app0.bin \;
          ls -la web-flasher/firmware

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web-flasher
      - id: deploy
        uses: actions/deploy-pages@v4
